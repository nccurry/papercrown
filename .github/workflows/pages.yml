name: Docs

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pages.yml'
      - 'docs/**'
      - 'scripts/**'
      - 'src/**'
      - 'Taskfile.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'versions.env'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: .uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      - uses: actions/cache@v4
        with:
          path: 'docs/site/Paper Crown/papercrown-docs/cache'
          key: docs-cache-${{ hashFiles('versions.env', 'docs/recipes/papercrown-docs.yaml', 'docs/vault/**', 'docs/themes/**', 'docs/assets/**', 'src/papercrown/**') }}
          restore-keys: |
            docs-cache-
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build docs
        shell: bash
        run: |
          set -euo pipefail
          source versions.env
          docker pull "${CI_IMAGE}:main"
          docker run --rm \
            -e UV_CACHE_DIR=/workspace/.uv-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "${CI_IMAGE}:main" \
            bash -lc 'git config --global --add safe.directory /workspace && uv sync --locked --all-groups && task docs:build'
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'docs/site/Paper Crown/papercrown-docs/web'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
