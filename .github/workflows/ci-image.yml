name: CI Builder Image

on:
  push:
    branches:
      - main
    paths:
      - 'versions.env'
      - 'Dockerfile.ci'
      - 'dependencies.yaml'
      - 'scripts/deps-install.sh'
      - 'scripts/deps-install.ps1'
      - 'scripts/bootstrap.sh'
      - 'scripts/bootstrap.ps1'
      - 'scripts/sync_dependencies.py'
      - '.github/workflows/ci-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          source versions.env
          echo "ci_image=${CI_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "uv_base_image=${UV_BASE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "task_version=${TASK_VERSION}" >> "$GITHUB_OUTPUT"
          echo "obsidian_export_version=${OBSIDIAN_EXPORT_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish CI image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: |
            ${{ steps.versions.outputs.ci_image }}:main
            ${{ steps.versions.outputs.ci_image }}:sha-${{ github.sha }}
          build-args: |
            UV_BASE_IMAGE=${{ steps.versions.outputs.uv_base_image }}
            TASK_VERSION=${{ steps.versions.outputs.task_version }}
            OBSIDIAN_EXPORT_VERSION=${{ steps.versions.outputs.obsidian_export_version }}
          cache-from: type=gha,scope=ci-builder
          cache-to: type=gha,mode=max,scope=ci-builder
