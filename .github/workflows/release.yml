name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v4
        with:
          path: .uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-
      - name: Build release artifacts in CI image
        shell: bash
        run: |
          set -euo pipefail
          source versions.env
          docker pull "${CI_IMAGE}:main"
          docker run --rm \
            -e UV_CACHE_DIR=/workspace/.uv-cache \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            "${CI_IMAGE}:main" \
            bash -lc 'git config --global --add safe.directory /workspace && uv sync --locked --all-groups && task package && task package:verify && task audit:public'
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
