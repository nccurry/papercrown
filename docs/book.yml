title: Paper Crown
subtitle: A framework for building TTRPG material
cover_eyebrow: Documentation
output_dir: site
output_name: papercrown-docs
art_dir: assets
theme: papercrown-docs
cover:
  enabled: true

metadata:
  authors:
    - nccurry
  description: Developer and user documentation for Paper Crown.
  keywords:
    - Markdown
    - TTRPG
    - PDF
    - static web
  license: AGPL-3.0-or-later
  credits:
    design:
      - Paper Crown maintainers

fillers:
  enabled: true
  art_dir: papercrown-docs
  slots:
    chapter-end:
      min_space: 0.75in
      max_space: 6.00in
      shapes:
        - tailpiece
        - spot
        - small-wide
        - plate
        - page-finish
  assets:
    - id: filler-spot-codex-crown
      art: fillers/spot/filler-spot-codex-crown-01.png
      shape: spot
      height: 1.10in
    - id: filler-spot-launch-console
      art: fillers/spot/filler-spot-launch-console-01.png
      shape: spot
      height: 1.10in
    - id: filler-spot-casefile-orbit
      art: fillers/spot/filler-spot-casefile-orbit-01.png
      shape: spot
      height: 1.10in
    - id: filler-spot-field-guide-tag
      art: fillers/spot/filler-spot-field-guide-tag-01.png
      shape: spot
      height: 1.10in
    - id: filler-wide-codex-route
      art: fillers/wide/filler-wide-codex-route-01.png
      shape: small-wide
      height: 0.72in
    - id: filler-wide-launch-panel
      art: fillers/wide/filler-wide-launch-panel-01.png
      shape: small-wide
      height: 0.72in
    - id: filler-wide-casefile-ritual
      art: fillers/wide/filler-wide-casefile-ritual-01.png
      shape: small-wide
      height: 0.72in
page_damage:
  enabled: true
  art_dir: papercrown-docs/page-wear
  seed: papercrown-docs-v2
  density: 0.32
  max_assets_per_page: 1
  opacity: 0.22
  skip:
    - cover
    - toc
    - divider
    - splash

vaults:
  docs: vault

contents:
  - kind: toc
    title: Contents
  - kind: file
    style: overview
    title: Overview
    slug: overview
    eyebrow: Documentation
    art: papercrown-docs/dividers/divider-overview-docs-crown.png
    toc_depth: 3
    source: docs:Overview.md
  - kind: file
    style: launch
    title: Quick Start
    slug: quick-start
    eyebrow: First Build
    art: papercrown-docs/dividers/divider-quick-start-launch-checklist.png
    toc_depth: 3
    source: docs:Quick Start.md
  - kind: file
    style: codex
    title: Architecture
    slug: architecture
    eyebrow: System Model
    art: papercrown-docs/dividers/divider-overview-fantasy-codex.png
    toc_depth: 3
    source: docs:Architecture.md
  - kind: file
    style: casefile
    title: Book Configs
    slug: book-configs
    eyebrow: Book Contract
    art: papercrown-docs/dividers/divider-authoring-occult-casefile.png
    toc_depth: 3
    source: docs:Book Configs.md
  - kind: file
    style: vault
    title: Vaults and Markdown
    slug: vaults-and-markdown
    eyebrow: Content Sources
    art: papercrown-docs/dividers/divider-vaults-markdown-archive.png
    toc_depth: 3
    source: docs:Vaults and Markdown.md
  - kind: file
    style: theme-lab
    title: Themes
    slug: themes
    eyebrow: Visual System
    art: papercrown-docs/dividers/divider-themes-gallery-spread.png
    toc_depth: 3
    source: docs:Themes.md
  - kind: file
    style: casefile
    title: Art
    slug: art
    eyebrow: Asset Library
    art: papercrown-docs/dividers/divider-authoring-occult-casefile.png
    toc_depth: 3
    source: docs:Art.md
  - kind: file
    style: field-guide
    title: Builds and Publishing
    slug: builds-and-publishing
    eyebrow: Output Routes
    art: papercrown-docs/dividers/divider-maintaining-industrial-guide.png
    toc_depth: 3
    source: docs:Builds and Publishing.md
  - kind: file
    style: launch
    title: Developer Guide
    slug: developer-guide
    eyebrow: Repository Workflows
    art: papercrown-docs/dividers/divider-setup-launch-manual.png
    toc_depth: 3
    source: docs:Developer Guide.md
