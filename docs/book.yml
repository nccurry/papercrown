title: Paper Crown
subtitle: A framework for building TTRPG material
cover_eyebrow: Documentation
output_dir: site
output_name: papercrown-docs
theme: papercrown-docs

art:
  library: assets
  cover:
    enabled: true
  placements:
    - id: quick-start-core-flow
      image: papercrown-docs/splashes/splash-core-flow-launch-sequence.png
      target: after-heading
      chapter: quick-start
      heading: Core Flow
      placement: bottom-half
    - id: architecture-product-model
      image: papercrown-docs/splashes/splash-product-model-codex-route.png
      target: after-heading
      chapter: architecture
      heading: Product Model
      placement: bottom-half
    - id: book-configs-compact-reference
      image: papercrown-docs/splashes/splash-compact-reference-casefile-ritual.png
      target: after-heading
      chapter: book-configs
      heading: Compact Field Reference
      placement: bottom-half
    - id: themes-local-example
      image: papercrown-docs/splashes/splash-theme-gallery-spread.png
      target: after-heading
      chapter: themes
      heading: Local Theme Example
      placement: bottom-half
    - id: publishing-github-pages
      image: papercrown-docs/splashes/splash-pages-field-guide-press.png
      target: after-heading
      chapter: builds-and-publishing
      heading: GitHub Pages
      placement: bottom-half
    - id: developer-bootstrap
      image: papercrown-docs/splashes/splash-repository-bootstrap-launch-panel.png
      target: after-heading
      chapter: developer-guide
      heading: Repository Bootstrap
      placement: bottom-half
  fillers:
    enabled: true
    folder: papercrown-docs
    slots:
      chapter-end:
        min_space: 0.75in
        max_space: 6.00in
        shapes:
          - tailpiece
          - spot
          - small-wide
          - plate
          - page-finish
    assets:
      - id: filler-spot-codex-crown
        image: fillers/spot/filler-spot-codex-crown-01.png
        shape: spot
        height: 1.10in
      - id: filler-spot-launch-console
        image: fillers/spot/filler-spot-launch-console-01.png
        shape: spot
        height: 1.10in
      - id: filler-spot-casefile-orbit
        image: fillers/spot/filler-spot-casefile-orbit-01.png
        shape: spot
        height: 1.10in
      - id: filler-spot-field-guide-tag
        image: fillers/spot/filler-spot-field-guide-tag-01.png
        shape: spot
        height: 1.10in
      - id: filler-wide-codex-route
        image: fillers/wide/filler-wide-codex-route-01.png
        shape: small-wide
        height: 0.72in
      - id: filler-wide-launch-panel
        image: fillers/wide/filler-wide-launch-panel-01.png
        shape: small-wide
        height: 0.72in
      - id: filler-wide-casefile-ritual
        image: fillers/wide/filler-wide-casefile-ritual-01.png
        shape: small-wide
        height: 0.72in
  wear:
    enabled: true
    folder: papercrown-docs/page-wear
    seed: papercrown-docs-v2
    density: 0.32
    max_assets_per_page: 1
    opacity: 0.22
    skip:
      - cover
      - toc
      - divider
      - splash

metadata:
  authors:
    - nccurry
  description: Developer and user documentation for Paper Crown.
  keywords:
    - Markdown
    - TTRPG
    - PDF
    - static web
  license: AGPL-3.0-or-later
  credits:
    design:
      - Paper Crown maintainers

vaults:
  docs: vault

contents:
  - kind: toc
    title: Contents
  - kind: file
    style: fantasy
    title: Overview
    slug: overview
    eyebrow: Fantasy Primer
    art:
      divider: papercrown-docs/classes/dividers/class-overview-title-plate.jpg
    toc_depth: 3
    source: docs:Overview.md
  - kind: file
    style: space-opera
    title: Quick Start
    slug: quick-start
    eyebrow: Launch Sequence
    art:
      divider: papercrown-docs/classes/dividers/class-quick-start-title-plate.jpg
    toc_depth: 3
    source: docs:Quick Start.md
  - kind: file
    style: comic-book
    title: Architecture
    slug: architecture
    eyebrow: Panel Layout
    art:
      divider: papercrown-docs/classes/dividers/class-architecture-title-plate.jpg
    toc_depth: 3
    source: docs:Architecture.md
  - kind: file
    style: occult-casefile
    title: Book Configs
    slug: book-configs
    eyebrow: Binding Contract
    art:
      divider: papercrown-docs/classes/dividers/class-book-configs-title-plate.jpg
    toc_depth: 3
    source: docs:Book Configs.md
  - kind: file
    style: hexcrawl
    title: Vaults and Markdown
    slug: vaults-and-markdown
    eyebrow: Map and Notes
    art:
      divider: papercrown-docs/classes/dividers/class-vaults-markdown-title-plate.jpg
    toc_depth: 3
    source: docs:Vaults and Markdown.md
  - kind: file
    style: zine-lab
    title: Themes
    slug: themes
    eyebrow: Paste-Up Lab
    art:
      divider: papercrown-docs/classes/dividers/class-themes-title-plate.jpg
    toc_depth: 3
    source: docs:Themes.md
  - kind: file
    style: bestiary-gallery
    title: Art
    slug: art
    eyebrow: Field Plates
    art:
      divider: papercrown-docs/classes/dividers/class-art-title-plate.jpg
    toc_depth: 3
    source: docs:Art.md
  - kind: file
    style: steampunk
    title: Builds and Publishing
    slug: builds-and-publishing
    eyebrow: Pressworks
    art:
      divider: papercrown-docs/classes/dividers/class-builds-publishing-title-plate.jpg
    toc_depth: 3
    source: docs:Builds and Publishing.md
  - kind: file
    style: cyberpunk
    title: Developer Guide
    slug: developer-guide
    eyebrow: Console Ops
    art:
      divider: papercrown-docs/classes/dividers/class-developer-guide-title-plate.jpg
    toc_depth: 3
    source: docs:Developer Guide.md
