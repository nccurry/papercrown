version: '3'

vars:
  RECIPE: '{{default "examples/starfall/recipes/starfall-field-guide.yaml" .RECIPE}}'
  DOCS_RECIPE: '{{default "docs/recipes/papercrown-docs.yaml" .DOCS_RECIPE}}'
  DOCS_WEB: '{{default "docs/site/Paper Crown/papercrown-docs/web" .DOCS_WEB}}'
  PORT: '{{default "8000" .PORT}}'
  SCOPE: '{{default "book" .SCOPE}}'
  PROFILE: '{{default "print" .PROFILE}}'
  JOBS: '{{default "auto" .JOBS}}'

tasks:
  setup:
    desc: Install local development dependencies.
    cmds:
      - task deps:install

  deps:
    desc: Report project dependency status.
    cmds:
      - task deps:check

  deps:check:
    desc: Report project dependency status and metadata drift.
    cmds:
      - uv run --locked papercrown deps check
      - task deps:sync

  deps:sync:
    desc: Verify repo dependency metadata is synchronized with versions.env.
    cmds:
      - uv run --locked python scripts/sync_dependencies.py --check

  deps:install:
    desc: Install platform and Python dependencies, then verify them.
    cmds:
      - task: deps:install:windows
      - task: deps:install:posix

  deps:install:windows:
    internal: true
    platforms: [windows]
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File scripts/deps-install.ps1

  deps:install:posix:
    internal: true
    platforms: [linux, darwin]
    cmds:
      - bash scripts/deps-install.sh

  lint:
    desc: Run static analysis and formatting checks.
    cmds:
      - uv run ruff check src tests scripts
      - uv run ruff format --check src tests scripts
      - uv run mypy

  format:
    desc: Format and apply safe lint fixes.
    cmds:
      - uv run ruff check --fix src tests scripts
      - uv run ruff format src tests scripts

  test:
    desc: Run the test suite.
    cmds:
      - uv run pytest

  package:
    desc: Build source and wheel distributions.
    deps: [package:clean]
    cmds:
      - uv build

  package:wheel:
    desc: Build the wheel distribution used by PR checks.
    deps: [package:clean]
    cmds:
      - uv build --wheel

  package:clean:
    desc: Remove generated package build artifacts.
    cmds:
      - uv run python scripts/clean_package.py

  package:verify:
    desc: Verify built distributions include runtime resources and CLI metadata.
    cmds:
      - uv run python scripts/verify_package.py

  check:
    desc: Run the full local quality gate used by CI.
    cmds:
      - task deps
      - task lint
      - task test
      - task package:wheel
      - task package:verify

  docker:check:
    desc: Run the same local quality gate inside the CI Docker image.
    cmds:
      - docker build -f Dockerfile.ci -t papercrown-ci .
      - docker run --rm papercrown-ci

  docker:image:
    desc: Build the reusable Paper Crown runtime container image.
    cmds:
      - docker build -t papercrown .

  docker:image:publish:
    desc: Build and optionally publish the reusable Paper Crown runtime container image.
    platforms: [linux]
    cmds:
      - bash scripts/container-build.sh

  build:
    desc: Build a recipe with the installed Paper Crown CLI.
    cmds:
      - uv run papercrown build {{.RECIPE | toSlash | quote}} --scope {{.SCOPE | quote}} --profile {{.PROFILE | quote}} --jobs {{.JOBS | quote}}

  manifest:
    desc: Print a recipe manifest.
    cmds:
      - uv run papercrown manifest {{.RECIPE | toSlash | quote}}

  doctor:
    desc: Run preflight diagnostics for a recipe.
    cmds:
      - uv run papercrown doctor {{.RECIPE | toSlash | quote}}

  doctor:strict:
    desc: Run strict preflight diagnostics for CI/release checks.
    cmds:
      - uv run papercrown doctor {{.RECIPE | toSlash | quote}} --strict

  verify:
    desc: Verify generated PDFs for a recipe.
    cmds:
      - uv run papercrown verify {{.RECIPE | toSlash | quote}} --scope {{.SCOPE | quote}} --profile {{.PROFILE | quote}} --strict

  init:
    desc: Create a sample Paper Crown project in ./scratch.
    cmds:
      - uv run papercrown init scratch --force

  docs:build:
    desc: Build the GitHub Pages documentation with Paper Crown.
    cmds:
      - uv run papercrown build {{.DOCS_RECIPE | toSlash | quote}} --target web --force

  docs:serve:
    desc: Serve the generated documentation locally.
    deps: [docs:build]
    cmds:
      - uv run python -m http.server {{.PORT | quote}} --directory {{.DOCS_WEB | toSlash | quote}}

  docs:clean:
    desc: Remove generated documentation output.
    cmds:
      - uv run python -c "import shutil; shutil.rmtree('docs/site', ignore_errors=True)"

  themes:list:
    desc: List bundled Paper Crown themes.
    cmds:
      - uv run papercrown themes list

  themes:copy:
    desc: Copy a bundled Paper Crown theme.
    cmds:
      - uv run papercrown themes copy {{.THEME | quote}} {{.DEST | quote}}

  release:
    desc: Build, verify, and create a GitHub release for the current tag.
    deps: [package, package:verify]
    preconditions:
      - sh: test -n "$GITHUB_REF_NAME"
        msg: GITHUB_REF_NAME must be set to the tag name.
    cmds:
      - gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
